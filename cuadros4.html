<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        .container-wrap {
            display: flex;          
            flex-wrap: wrap;        
            gap: 10px;
            padding: 10px;
            background-color: #f0f0f0;
        }
        .box { height: 80px; border-radius: 4px; }
        
        .w-70 { flex-basis: 68%; } 
        .w-30 { flex-basis: 28%; } 
        .w-40 { flex-basis: 38%; }
        .w-60 { flex-basis: 58%; }

        .orange { background-color: #ff7f00; }
        .teal { background-color: #008080; }
        .maroon { background-color: #660033; }
    </style>
</head>
<body>
    <div class="container-wrap">
        <div class="box orange w-70"></div>
        <div class="box orange w-30"></div>
        <div class="box teal w-40"></div>
        <div class="box teal w-60"></div>
        <div class="box maroon w-60"></div>
        <div class="box maroon w-40"></div>
    </div>
</body>
</html>
