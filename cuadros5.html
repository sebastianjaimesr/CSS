<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        .grid-container {
            display: flex;
            flex-wrap: wrap;       
            padding: 10px;
            background-color: #f0f0f0;
        }
        .item {
            flex-basis: calc(33.33% - 7px); 
            height: 100px;
            border-radius: 4px;
        }
        .orange { background-color: #ff7f00; }
        .teal { background-color: #008080; }
        .maroon { background-color: #660033; }
    </style>
</head>
<body>
    <div class="grid-container">
        <div class="item orange"></div>
        <div class="item orange"></div>
        <div class="item orange"></div>
        <div class="item teal"></div>
        <div class="item teal"></div>
        <div class="item teal"></div>
        <div class="item maroon"></div>
        <div class="item maroon"></div>
        <div class="item maroon"></div>
    </div>
</body>
</html>
