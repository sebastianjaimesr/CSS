<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cuadros2</title>
    <style>
        .container-masonry {
            display: flex;
            flex-direction: column; 
            flex-wrap: wrap;      
            height: 450px;         
            gap: 10px;
            padding: 15px;
        }

        .box {
            width: 32%;         
            border-radius: 5px;
        }
        
        .small { flex-basis: 120px; } 
        .large { flex-basis: 260px; }

        .orange { background-color: #ff7f00; }
        .teal   { background-color: #008080; }
        .maroon { background-color: #660033; }
    </style>
</head>
<body>
    <div class="container-masonry">
        <div class="box orange large"></div>
        <div class="box maroon small"></div>
        
        <div class="box orange small"></div>
        <div class="box maroon large"></div>
        
        <div class="box teal large"></div>
        <div class="box maroon small"></div>
    </div>
</body>
</html>
