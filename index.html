<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portafolio de Ejercicios</title>
    <style>
        :root {
            --orange: #ff0000;
            --teal: #000000;
            --maroon: blue;
            --bg: #f4f4f9;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: var(--maroon);
            color: white;
            width: 100%;
            padding: 2rem 0;
            text-align: center;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Contenedor Principal usando Flexbox */
        .container {
            display: flex;
            flex-wrap: wrap; /* Permite que los cuadros salten de línea [cite: 266] */
            justify-content: center; /* Centra los elementos en el eje principal [cite: 213] */
            gap: 20px;
            max-width: 1000px;
            padding: 20px;
        }

        /* Estilo de los cuadros de ejercicio */
        .card {
            background: white;
            border-bottom: 5px solid var(--orange);
            border-radius: 8px;
            width: 200px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s ease;
            text-decoration: none;
            color: #333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card:hover {
            transform: translateY(-10px);
            border-bottom-color: var(--teal);
        }

        .card h3 {
            margin: 0;
            font-size: 1.1rem;
        }

        footer {
            margin-top: auto;
            padding: 2rem;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Ejercicios de clase</h1>
    </header>

    <div class="container">
        <a href="cuadros1.html" class="card"><h3>Cuadros 1</h3></a>
        <a href="cuadros2.html" class="card"><h3>Cuadros 2</h3></a>
        <a href="cuadros3.html" class="card"><h3>Cuadros 3</h3></a>
        <a href="cuadros4.html" class="card"><h3>Cuadros 4</h3></a>
        <a href="cuadros5.html" class="card"><h3>Cuadros 5</h3></a>
        
        <a href="ejercicio1.html" class="card"><h3>Ejercicio 1</h3></a>
        <a href="ejercicio2.html" class="card"><h3>Ejercicio 2</h3></a>
        <a href="ejercicio3.html" class="card"><h3>Ejercicio 3</h3></a>
        <a href="ejercicio4.html" class="card"><h3>Ejercicio 4</h3></a>
    </div>

</body>
</html>
